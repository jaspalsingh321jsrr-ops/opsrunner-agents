name: Email Sender Agent

on:
  schedule:
    - cron: '*/30 * * * *'  # every 30 minutes — checks for approved emails
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.11'
      - run: pip install anthropic python-dotenv
      - name: Run email sender
        env:
          GMAIL_EMAIL: ${{ secrets.GMAIL_EMAIL }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
        run: python agents/email_sender.py
      - name: Run manager review
        run: python agents/manager.py

      - name: Save results
        run: |
          git config user.name "OpsRunner Bot"
          git config user.email "bot@opsrunner.ai"
          git add data/leads.json data/finance.json
          git diff --staged --quiet || git commit -m "Email sender run — $(date -u +%Y-%m-%d-%H%M)"
          git push
