name: Lead Finder Agent

on:
  schedule:
    - cron: '0 */2 * * *'    # every 2h: find Hunter-verified leads
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: scroll-and-find
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.11'

      - run: pip install anthropic requests python-dotenv

      - name: Find leads + write emails
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          HUNTER_API_KEY: ${{ secrets.HUNTER_API_KEY }}
        run: python agents/lead_finder.py

      - name: Save results
        run: |
          git config user.name "OpsRunner Bot"
          git config user.email "bot@opsrunner.ai"
          git add data/leads.json data/finance.json
          git diff --staged --quiet && exit 0
          git commit -m "Lead finder — $(date -u +%Y-%m-%d-%H%M)"
          for i in 1 2 3; do git pull --rebase && git push && break || sleep $((i*5)); done
