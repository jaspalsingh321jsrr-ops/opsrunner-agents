<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OpsRunner — Command Center</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#0f1117;color:#e2e8f0;min-height:100vh}
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:200px;background:#1a1d27;border-right:1px solid #2a2d3e;display:flex;flex-direction:column;flex-shrink:0}
.logo{padding:18px 16px 14px;border-bottom:1px solid #2a2d3e}
.logo h1{font-size:17px;font-weight:700;letter-spacing:-0.5px}
.logo p{font-size:10px;color:#64748b;margin-top:2px}
.nav{padding:8px 0;flex:1}
.nav-item{display:flex;align-items:center;gap:8px;padding:8px 16px;font-size:12px;cursor:pointer;color:#94a3b8;transition:all 0.12s;border-left:2px solid transparent}
.nav-item:hover{background:#222535;color:#e2e8f0}
.nav-item.active{background:#222535;color:#7f77dd;border-left-color:#7f77dd;font-weight:500}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:#1a1d27;border-bottom:1px solid #2a2d3e;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar h2{font-size:14px;font-weight:500}
.topbar p{font-size:11px;color:#64748b;margin-top:1px}
.btn{padding:6px 12px;border-radius:7px;cursor:pointer;font-size:11px;font-weight:500;border:1px solid #2a2d3e;background:transparent;color:#94a3b8;transition:all 0.15s}
.btn:hover{background:#222535;color:#e2e8f0}
.content{flex:1;overflow-y:auto;padding:16px 20px;display:flex;gap:16px}
.left-col{flex:1;min-width:0;display:flex;flex-direction:column;gap:12px}
.right-col{width:360px;flex-shrink:0;display:flex;flex-direction:column;gap:12px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.stat{background:#1a1d27;border:1px solid #2a2d3e;border-radius:10px;padding:12px 14px}
.stat .val{font-size:24px;font-weight:700;font-family:monospace}
.stat .lbl{font-size:10px;color:#64748b;margin-top:3px}
.card{background:#1a1d27;border:1px solid #2a2d3e;border-radius:10px;padding:14px}
.card-title{font-size:11px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:10px}
.task{padding:9px 10px;border:1px solid #2a2d3e;border-radius:8px;cursor:pointer;transition:border-color 0.12s;margin-bottom:6px}
.task:hover{border-color:#7f77dd}
.task.sel{border-color:#7f77dd;background:#1e2038}
.task-row{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.tag{font-size:9px;font-weight:600;padding:2px 7px;border-radius:10px;flex-shrink:0}
.task-title{font-size:12px;font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.task-time{font-size:10px;color:#64748b;flex-shrink:0}
.task-meta{font-size:10px;color:#64748b;display:flex;gap:10px}
.badge{padding:1px 7px;border-radius:8px;font-size:9px;font-weight:600}
.b-pending{background:#1e3a5f;color:#60a5fa}
.b-approved{background:#1a3528;color:#4ade80}
.b-completed{background:#0d2e1d;color:#22c55e}
.b-revision{background:#2d1515;color:#f87171}
.detail{background:#1a1d27;border:1px solid #2a2d3e;border-radius:10px;flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:300px}
.detail-head{padding:12px 14px;border-bottom:1px solid #2a2d3e}
.detail-head h3{font-size:13px;font-weight:500;margin-bottom:4px}
.detail-meta{font-size:10px;color:#64748b}
.detail-out{flex:1;overflow-y:auto;padding:12px 14px;font-size:11.5px;line-height:1.7;color:#cbd5e1;white-space:pre-wrap;background:#111827;font-family:monospace}
.detail-actions{padding:10px 14px;border-top:1px solid #2a2d3e;display:flex;gap:8px}
.btn-approve{background:#14532d;color:#4ade80;border:none;padding:6px 14px;border-radius:7px;cursor:pointer;font-size:11px;font-weight:500}
.btn-approve:hover{background:#166534}
.btn-reject{background:#7f1d1d;color:#f87171;border:none;padding:6px 14px;border-radius:7px;cursor:pointer;font-size:11px;font-weight:500}
.btn-reject:hover{background:#991b1b}
.empty{display:flex;align-items:center;justify-content:center;color:#64748b;font-size:12px;flex-direction:column;gap:6px;padding:40px}
.toast{position:fixed;bottom:20px;right:20px;background:#1e3a5f;color:#60a5fa;padding:10px 16px;border-radius:8px;font-size:12px;font-weight:500;border:1px solid #2a4a7a;z-index:999;display:none}
</style>
</head>
<body>
<div class="app">
<div class="sidebar">
  <div class="logo"><h1>OpsRunner</h1><p>AI Command Center</p></div>
  <div class="nav">
    <div class="nav-item active" data-view="all">⊞ All tasks</div>
    <div class="nav-item" data-view="pending">⏳ Pending review</div>
    <div class="nav-item" data-view="completed">✓ Completed</div>
  </div>
</div>
<div class="main">
  <div class="topbar">
    <div>
      <h2 id="view-title">All tasks</h2>
      <p id="last-refresh">Loading...</p>
    </div>
    <button class="btn" onclick="loadData()">↺ Refresh</button>
  </div>
  <div class="content">
    <div class="left-col">
      <div class="stats">
        <div class="stat"><div class="val" id="s-total" style="color:#7f77dd">0</div><div class="lbl">Total tasks</div></div>
        <div class="stat"><div class="val" id="s-pending" style="color:#60a5fa">0</div><div class="lbl">Pending</div></div>
        <div class="stat"><div class="val" id="s-completed" style="color:#4ade80">0</div><div class="lbl">Completed</div></div>
        <div class="stat"><div class="val" id="s-today" style="color:#fbbf24">0</div><div class="lbl">Today</div></div>
      </div>
      <div class="card">
        <div class="card-title">Tasks</div>
        <div id="task-list"></div>
      </div>
    </div>
    <div class="right-col">
      <div class="detail" id="detail-panel">
        <div class="empty" id="empty-msg">
          <div style="font-size:28px">📋</div>
          <div>Select a task to view output</div>
        </div>
        <div id="detail-content" style="display:none;flex:1;flex-direction:column">
          <div class="detail-head">
            <h3 id="d-title"></h3>
            <div class="detail-meta" id="d-meta"></div>
          </div>
          <div class="detail-out" id="d-output"></div>
          <div class="detail-actions">
            <button class="btn-approve" onclick="approve()">✓ Approve</button>
            <button class="btn-reject" onclick="reject()">✗ Needs revision</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
</div>
<div class="toast" id="toast"></div>

<script>
let allTasks = [];
let selectedId = null;
let currentView = "all";

const agentColors = {
  "Sales agent":["#1e3a5f","#60a5fa"],
  "Marketing agent":["#1a3528","#4ade80"],
  "Finance agent":["#2d1f4a","#a78bfa"],
  "Client success agent":["#2a1e38","#f472b6"],
  "Tech agent":["#1f2d3a","#38bdf8"],
};
const badgeClass = {pending_review:"b-pending",approved:"b-approved",completed:"b-completed",needs_revision:"b-revision"};
const badgeLabel = {pending_review:"Pending",approved:"Approved",completed:"Completed",needs_revision:"Needs revision"};

function timeAgo(iso){
  const d=Math.floor((Date.now()-new Date(iso))/60000);
  if(d<1)return"just now";if(d<60)return d+"m ago";
  if(d<1440)return Math.floor(d/60)+"h ago";return Math.floor(d/1440)+"d ago";
}

function renderTasks(){
  let tasks=[...allTasks];
  if(currentView==="pending") tasks=tasks.filter(t=>t.status==="pending_review");
  if(currentView==="completed") tasks=tasks.filter(t=>t.status==="completed");

  document.getElementById("s-total").textContent=allTasks.length;
  document.getElementById("s-pending").textContent=allTasks.filter(t=>t.status==="pending_review").length;
  document.getElementById("s-completed").textContent=allTasks.filter(t=>t.status==="completed").length;
  const today=new Date().toISOString().slice(0,10);
  document.getElementById("s-today").textContent=allTasks.filter(t=>t.created_at?.slice(0,10)===today).length;

  const list=document.getElementById("task-list");
  if(tasks.length===0){
    list.innerHTML=`<div style="color:#64748b;font-size:12px;padding:20px 0;text-align:center">
      No tasks yet.<br><br>Go to GitHub Actions → Sales Agent → Run workflow</div>`;
    return;
  }
  list.innerHTML=tasks.slice(0,30).map(t=>{
    const [bg,fg]=agentColors[t.agent]||["#1a2a3a","#94a3b8"];
    const bc=badgeClass[t.status]||"b-pending";
    const bl=badgeLabel[t.status]||t.status;
    return`<div class="task${t.id===selectedId?" sel":""}" onclick="selectTask('${t.id}')">
      <div class="task-row">
        <span class="tag" style="background:${bg};color:${fg}">${t.agent}</span>
        <span class="task-title">${t.title}</span>
        <span class="task-time">${timeAgo(t.created_at)}</span>
      </div>
      <div class="task-meta">
        <span class="badge ${bc}">${bl}</span>
        ${t.approved_by?`<span>✓ ${t.approved_by}</span>`:""}
      </div>
    </div>`;
  }).join("");
}

function selectTask(id){
  selectedId=id;
  const t=allTasks.find(x=>x.id===id);
  if(!t)return;
  document.getElementById("empty-msg").style.display="none";
  const dc=document.getElementById("detail-content");
  dc.style.display="flex";dc.style.flexDirection="column";dc.style.flex="1";
  document.getElementById("d-title").textContent=t.title;
  const bc=badgeClass[t.status]||"b-pending";
  const bl=badgeLabel[t.status]||t.status;
  document.getElementById("d-meta").innerHTML=
    `<span class="badge ${bc}">${bl}</span> &nbsp;${t.agent}&nbsp;&nbsp;${timeAgo(t.created_at)}
    ${t.revision_note?`<div style="margin-top:4px;color:#f87171;font-size:10px">${t.revision_note.slice(0,200)}</div>`:""}`;
  document.getElementById("d-output").textContent=t.output;
  renderTasks();
}

function approve(){
  if(!selectedId)return;
  const t=allTasks.find(x=>x.id===selectedId);
  if(!t)return;
  t.status="completed";t.approved_by="Jaspal";
  saveTasks();renderTasks();selectTask(selectedId);
  toast("✓ Approved");
}

function reject(){
  if(!selectedId)return;
  const note=prompt("What needs to be fixed?");
  if(!note)return;
  const t=allTasks.find(x=>x.id===selectedId);
  if(!t)return;
  t.status="needs_revision";t.revision_note=note;
  saveTasks();renderTasks();selectTask(selectedId);
  toast("↩ Sent back for revision");
}

function saveTasks(){
  localStorage.setItem("opsrunner_tasks",JSON.stringify(allTasks));
}

async function loadData(){
  // Try 1: load from local server (python -m http.server)
  try{
    const r=await fetch("../data/tasks.json?t="+Date.now());
    if(r.ok){
      const data=await r.json();
      if(data.length>0){
        allTasks=data;
        document.getElementById("last-refresh").textContent="Live from local file · "+new Date().toLocaleTimeString();
        renderTasks();return;
      }
    }
  }catch(e){}

  // Try 2: load from GitHub (public repo)
  try{
    const r=await fetch("https://raw.githubusercontent.com/jaspalsingh321jsrr-ops/opsrunner-agents/main/data/tasks.json?t="+Date.now());
    if(r.ok){
      const data=await r.json();
      if(data.length>0){
        allTasks=data;
        document.getElementById("last-refresh").textContent="From GitHub · "+new Date().toLocaleTimeString();
        renderTasks();return;
      }
    }
  }catch(e){}

  // Try 3: load from localStorage (previously saved)
  const saved=localStorage.getItem("opsrunner_tasks");
  if(saved){
    allTasks=JSON.parse(saved);
    document.getElementById("last-refresh").textContent="From cache · "+new Date().toLocaleTimeString();
    renderTasks();return;
  }

  document.getElementById("last-refresh").textContent="Waiting for agent to run...";
  renderTasks();
}

function toast(msg){
  const el=document.getElementById("toast");
  el.textContent=msg;el.style.display="block";
  setTimeout(()=>el.style.display="none",3000);
}

document.querySelectorAll(".nav-item").forEach(el=>{
  el.addEventListener("click",()=>{
    document.querySelectorAll(".nav-item").forEach(x=>x.classList.remove("active"));
    el.classList.add("active");
    currentView=el.dataset.view;
    document.getElementById("view-title").textContent=el.textContent.trim().slice(2);
    renderTasks();
  });
});

loadData();
setInterval(loadData,30000);
</script>
</body>
</html>
